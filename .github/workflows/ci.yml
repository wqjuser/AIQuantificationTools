name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build web app
        run: npm run build

      - name: Validate Docker Compose config
        run: docker compose config

      - name: Build Docker images
        run: docker compose build

      - name: Smoke test Docker deployment
        run: python tools/docker_smoke.py --no-build --down
