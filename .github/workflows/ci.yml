name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      INSTALL_DATA_DEPS: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build web app
        run: npm run build

      - name: Validate Docker Compose config
        run: docker compose config

      - name: Build Docker images
        run: docker compose build

      - name: Smoke test Docker deployment
        run: npm run docker:smoke -- --no-build --down

      - name: Run P0 acceptance smoke
        run: npm run docker:smoke:p0 -- --no-build --down

      - name: Validate P0 acceptance manifest
        run: npm run docker:smoke:p0:validate

      - name: Run P1 acceptance smoke
        run: npm run docker:smoke:p1 -- --no-build --down

      - name: Validate P1 acceptance manifest
        run: npm run docker:smoke:p1:validate

      - name: Run complete Stage 5 release smoke
        run: npm run docker:smoke:stage5 -- --no-build --down

      - name: Validate complete Stage 5 release evidence
        run: npm run docker:smoke:stage5:validate

      - name: Run Stage 6 no-credential safety smoke
        run: npm run docker:smoke:stage6 -- --no-build

      - name: Validate Stage 6 no-credential safety evidence
        run: npm run docker:smoke:stage6:validate

      - name: Run Stage 7 no-credential production read-only safety smoke
        run: npm run docker:smoke:stage7 -- --no-build

      - name: Validate Stage 7 production read-only safety evidence
        run: npm run docker:smoke:stage7:validate

      - name: Run Stage 8 production read-only continuity smoke
        run: npm run docker:smoke:stage8 -- --no-build

      - name: Validate Stage 8 production read-only continuity evidence
        run: npm run docker:smoke:stage8:validate

      - name: Upload P0 acceptance manifest
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: p0-acceptance-manifest
          path: data/p0-acceptance.json
          if-no-files-found: warn

      - name: Upload P1 acceptance manifest
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: p1-acceptance-manifest
          path: data/p1-acceptance.json
          if-no-files-found: warn

      - name: Upload Stage 5 release manifests
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: stage5-release-manifests
          path: |
            data/stage3-ai-review.json
            data/stage4-portfolio-paper.json
            data/stage5-shadow-execution.json
            data/stage5-sandbox-readiness.json
            data/stage5-sandbox-readonly-probe.json
            data/stage5-sandbox-authorization-preflight.json
            data/stage5-sandbox-authorization-review.json
            data/stage5-exit-acceptance.json
          if-no-files-found: warn

      - name: Upload Stage 6 safety manifest
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: stage6-sandbox-safety-manifest
          path: data/stage6-sandbox-safety.json
          if-no-files-found: warn

      - name: Upload Stage 7 production read-only safety manifest
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: stage7-production-readonly-safety-manifest
          path: data/stage7-production-readonly-safety.json
          if-no-files-found: warn

      - name: Upload Stage 8 production read-only continuity manifest
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: stage8-production-readonly-continuity-manifest
          path: data/stage8-production-readonly-continuity.json
          if-no-files-found: warn
